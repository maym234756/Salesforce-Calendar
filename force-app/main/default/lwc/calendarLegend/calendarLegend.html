<template>
    <template if:true={hasItems}>
        <div class="legend slds-p-horizontal_small slds-p-bottom_small">
            <template for:each={normalizedItems} for:item="item">
                <div key={item.key} class="legend-item slds-box slds-theme_default">
                    <div class="legend-item__summary">
                        <span class="legend-item__swatch" style={item.swatchStyle}></span>
                        <div class="legend-item__text">
                            <span class="legend-item__label">{item.label}</span>
                            <span class="legend-item__value">{item.color}</span>
                        </div>
                    </div>
                    <template if:true={editable}>
                        <div class="legend-item__actions">
                            <input
                                class="legend-item__picker"
                                type="color"
                                value={item.color}
                                data-item-id={item.id}
                                aria-label={item.colorPickerLabel}
                                onchange={handleColorChange}
                            />
                            <button
                                type="button"
                                class="slds-button slds-button_neutral legend-item__reset"
                                data-item-id={item.id}
                                title={item.resetLabel}
                                onclick={handleResetClick}
                                disabled={item.isDefaultColor}
                            >
                                Reset
                            </button>
                        </div>
                    </template>
                </div>
            </template>
        </div>
    </template>
</template>
