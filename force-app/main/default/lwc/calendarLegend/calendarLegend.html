<template>
    <template if:true={hasItems}>
        <div class="slds-grid slds-wrap slds-gutters_x-small slds-p-horizontal_small slds-p-bottom_small">
            <template for:each={normalizedItems} for:item="item">
                <div key={item.key} class="slds-col slds-no-flex">
                    <span class="slds-pill">
                        <span class="slds-pill__label slds-grid slds-grid_vertical-align-center slds-gutters_x-small">
                            <span class="slds-col slds-no-flex">
                                <span style={item.swatchStyle}></span>
                            </span>
                            <span class="slds-col">{item.label}</span>
                        </span>
                    </span>
                </div>
            </template>
        </div>
    </template>
</template>
