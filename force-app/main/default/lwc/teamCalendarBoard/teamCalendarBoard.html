<template>
    <lightning-card title="Team Calendar Board" icon-name="standard:event">
        <div
            aria-live="polite"
            aria-atomic="true"
            class="slds-assistive-text"
        >{_ariaMessage}</div>

        <template if:true={activeMutationNotice}>
            <section class="mutation-toast" role="status" aria-live="polite">
                <div class="mutation-toast__body">
                    <span class="mutation-toast__message">{activeMutationNotice.message}</span>
                    <div class="mutation-toast__actions">
                        <button
                            type="button"
                            class="slds-button slds-button_neutral mutation-toast__action"
                            onclick={handleMutationNoticeAction}
                        >
                            {activeMutationNotice.actionLabel}
                        </button>
                        <button
                            type="button"
                            class="slds-button slds-button_base mutation-toast__dismiss"
                            onclick={dismissMutationNotice}
                        >
                            Dismiss
                        </button>
                    </div>
                </div>
            </section>
        </template>

        <div class="slds-hide" aria-hidden="true">
            <div data-export-form-host lwc:dom="manual"></div>

            <template for:each={calendarViewLoaderDefinitions} for:item="definition">
                <c-calendar-view-loader
                    key={definition.id}
                    definition-id={definition.id}
                    definition-name={definition.name}
                    object-api-name={definition.listViewObjectApiName}
                    list-view-api-name={definition.listViewApiName}
                    optional-fields-csv={definition.optionalFieldsCsv}
                    onpayloadload={handleCalendarViewPayloadLoad}
                    onpayloaderror={handleCalendarViewPayloadError}
                >
                </c-calendar-view-loader>
            </template>
        </div>

        <div class="board-wrap" oncontextmenu={handleBoardContextMenu} ontouchstart={handleTouchStart} ontouchend={handleTouchEnd}>
            <div class="board-toolbar-shell">
                <c-calendar-toolbar
                    range-label={rangeLabel}
                    event-count={eventCount}
                    current-view={currentView}
                    view-options={viewOptions}
                    selected-calendar-id={selectedCalendarId}
                    calendar-options={calendarOptions}
                    selected-status={selectedStatus}
                    status-options={statusOptions}
                    google-import-action-label={googleSyncViewState.importActionLabel}
                    google-import-action-disabled={googleSyncViewState.importActionDisabled}
                    google-export-action-label={googleSyncViewState.exportActionLabel}
                    google-export-action-disabled={googleSyncViewState.exportActionDisabled}
                    user-options={activeUserOptions}
                    active-user-options={activeUserOptions}
                    selected-user-ids={selectedUserIds}
                    selected-users={selectedUserIds}
                    selected-user-count={selectedUserCount}
                    active-user-count={activeUserCount}
                    max-selected-users={maxSelectedUsers}
                    max-users={maxSelectedUsers}
                    selected-users-detailed={selectedUsersDetailed}
                    selected-user-details={selectedUsersDetailed}
                    active-user-calendar-menu={activeUserCalendarMenu}
                    active-user-menu={activeUserCalendarMenu}
                    user-layout-preference={userLayoutPreference}
                    ontoday={handleToday}
                    onrefresh={handleRefresh}
                    onprev={handlePrev}
                    onnext={handleNext}
                    onnew={handleHeaderNewEvent}
                    onviewchange={handleViewChange}
                    oncalendarchange={handleCalendarChange}
                    onstatuschange={handleStatusChange}
                    onexportcsv={handleExportCsv}
                    onexportical={handleExportIcal}
                    ongeneratepdf={handleGeneratePdf}
                    ongoogleimportaction={handleGoogleToolbarEvent}
                    ongoogleexportaction={handleGoogleToolbarEvent}
                    onuserselectionchange={handleUserSelectionChange}
                    onusercalendaropen={handleUserCalendarOpen}
                    onusercalendarselectionchange={handleUserCalendarSelectionChange}
                    onusercalendarmenuclose={handleUserCalendarMenuClose}
                    onlayoutchange={handleToolbarLayoutChange}
                    onlayoutchanged={handleUserLayoutPreferenceChanged}
                    onruleschanged={handleSecurityRulesChanged}
                    onsearchchange={handleToolbarSearchChange}
                >
                </c-calendar-toolbar>
            </div>

            <div class={boardContentClass}>
                <div class="month-year-label slds-m-horizontal_small slds-m-bottom_x-small slds-text-title_bold">
                    {monthYearLabel}
                </div>

                <template if:true={hasLegendItems}>
                    <div class="board-legend">
                        <c-calendar-legend
                            items={legendItems}
                            editable
                            oncalendarcolorchange={handleLegendColorChange}
                            oncalendarcolorreset={handleLegendColorReset}
                        >
                        </c-calendar-legend>
                    </div>
                </template>

                <template if:true={error}>
                    <div class="slds-box slds-theme_error slds-m-around_small">
                        {error}
                    </div>
                </template>

                <template if:true={isLoading}>
                    <div class="board-loading">
                        <div class="board-skeleton" aria-hidden="true">
                            <div class="skel-toolbar"></div>
                            <div class="skel-grid">
                                <template for:each={skeletonCells} for:item="cell">
                                    <div key={cell.key} class="skel-cell">
                                        <div class="skel-line skel-line--day-num"></div>
                                        <div class="skel-line skel-line--bar skel-line--lg"></div>
                                        <div class="skel-line skel-line--bar skel-line--md"></div>
                                        <div class="skel-line skel-line--bar skel-line--sm"></div>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </div>
                </template>

                <template if:false={isLoading}>
                    <div class="board-view-region">
                        <template if:true={isGridView}>
                            <c-calendar-grid
                                weeks={weeks}
                                single-row={isWeekView}
                                show-weekends={showWeekends}
                                auto-expand-day-height={autoExpandDayHeight}
                                wrap-event-titles={wrapEventTitles}
                                compact-event-density={compactEventDensity}
                                ondayselect={handleDaySelect}
                                onquickcreate={handleGridQuickCreate}
                                onmoreevents={handleMoreEvents}
                                oneventdrop={handleEventDrop}
                                oneventopen={handleEventOpen}
                                oneventhover={handleEventHover}
                                oneventunhover={handleEventUnhover}
                                oneventcontextmenu={handleEventContextMenu}
                            >
                            </c-calendar-grid>
                        </template>

                        <template if:true={isDayView}>
                            <c-calendar-day-view
                                day-view-data={dayViewData}
                                ondayselect={handleDaySelect}
                                oneventopen={handleEventOpen}
                                oneventhover={handleEventHover}
                                oneventunhover={handleEventUnhover}
                                oneventcontextmenu={handleEventContextMenu}
                            >
                            </c-calendar-day-view>
                        </template>

                        <template if:true={isAgendaView}>
                            <c-calendar-agenda
                                groups={agendaGroups}
                                ondayselect={handleDaySelect}
                                oneventopen={handleEventOpen}
                                oneventhover={handleEventHover}
                                oneventunhover={handleEventUnhover}
                                oneventcontextmenu={handleEventContextMenu}
                            >
                            </c-calendar-agenda>
                        </template>

                        <template if:true={isTeamLoadView}>
                            <template if:true={hasTeamLoadRows}>
                                <div class="slds-box slds-m-around_small">
                                    <table class="slds-table slds-table_cell-buffer slds-table_bordered slds-table_col-bordered">
                                        <thead>
                                            <tr class="slds-line-height_reset">
                                                <th scope="col"><div class="slds-truncate" title="Calendar">Calendar</div></th>
                                                <th scope="col"><div class="slds-truncate" title="Total">Total</div></th>
                                                <th scope="col"><div class="slds-truncate" title="Confirmed">Confirmed</div></th>
                                                <th scope="col"><div class="slds-truncate" title="Planned">Planned</div></th>
                                                <th scope="col"><div class="slds-truncate" title="Cancelled">Cancelled</div></th>
                                                <th scope="col"><div class="slds-truncate" title="All Day">All Day</div></th>
                                                <th scope="col"><div class="slds-truncate" title="Timed">Timed</div></th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <template for:each={teamLoadRows} for:item="row">
                                                <tr key={row.key}>
                                                    <td>
                                                        <div class="slds-truncate" title={row.calendarName}>
                                                            <span style={row.colorStyle}></span>
                                                            <span class="slds-m-left_x-small">{row.calendarName}</span>
                                                        </div>
                                                    </td>
                                                    <td><div class="slds-truncate">{row.total}</div></td>
                                                    <td><div class="slds-truncate">{row.confirmed}</div></td>
                                                    <td><div class="slds-truncate">{row.planned}</div></td>
                                                    <td><div class="slds-truncate">{row.cancelled}</div></td>
                                                    <td><div class="slds-truncate">{row.allDay}</div></td>
                                                    <td><div class="slds-truncate">{row.timed}</div></td>
                                                </tr>
                                            </template>
                                        </tbody>
                                    </table>
                                </div>
                            </template>
                            <template if:false={hasTeamLoadRows}>
                                <div class="slds-box slds-m-around_small slds-theme_default">
                                    No calendar load data is available for this range.
                                </div>
                            </template>
                        </template>

                        <template if:true={isConflictsView}>
                            <template if:true={hasConflicts}>
                                <div class="slds-box slds-m-around_small">
                                    <table class="slds-table slds-table_cell-buffer slds-table_bordered slds-table_col-bordered">
                                        <thead>
                                            <tr class="slds-line-height_reset">
                                                <th scope="col"><div class="slds-truncate" title="Calendar">Calendar</div></th>
                                                <th scope="col"><div class="slds-truncate" title="Event 1">Event 1</div></th>
                                                <th scope="col"><div class="slds-truncate" title="Time 1">Time 1</div></th>
                                                <th scope="col"><div class="slds-truncate" title="Event 2">Event 2</div></th>
                                                <th scope="col"><div class="slds-truncate" title="Time 2">Time 2</div></th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <template for:each={conflictRows} for:item="row">
                                                <tr key={row.key}>
                                                    <td><div class="slds-truncate">{row.calendarName}</div></td>
                                                    <td><div class="slds-truncate">{row.firstTitle}</div></td>
                                                    <td><div class="slds-truncate">{row.firstTime}</div></td>
                                                    <td><div class="slds-truncate">{row.secondTitle}</div></td>
                                                    <td><div class="slds-truncate">{row.secondTime}</div></td>
                                                </tr>
                                            </template>
                                        </tbody>
                                    </table>
                                </div>
                            </template>
                            <template if:false={hasConflicts}>
                                <div class="slds-box slds-m-around_small slds-theme_success">
                                    No conflicts found for this range.
                                </div>
                            </template>
                        </template>

                        <template if:false={isGridView}>
                            <template if:false={isAgendaView}>
                                <template if:false={isTeamLoadView}>
                                    <template if:false={isConflictsView}>
                                        <div class="slds-box slds-m-around_small">
                                            No calendar days available for this range.
                                        </div>
                                    </template>
                                </template>
                            </template>
                        </template>
                    </div>
                </template>

                <template if:true={hasActiveEventMenu}>
                    <div
                        class="event-context-menu-scrim"
                        onclick={handleEventContextMenuClose}
                    ></div>
                    <section
                        class="event-context-menu slds-popover slds-popover_panel slds-nubbin_top-left"
                        style={eventContextMenuStyle}
                        role="menu"
                        aria-label="Event actions"
                    >
                        <div class="event-context-menu__title slds-text-title_caps">
                            Event Actions
                        </div>
                        <div class="event-context-menu__name slds-truncate" title={eventContextMenuRecordName}>
                            {eventContextMenuRecordName}
                        </div>
                        <template for:each={eventContextMenuItems} for:item="item">
                            <button
                                key={item.key}
                                type="button"
                                class={item.className}
                                data-action-type={item.actionType}
                                data-record-id={item.recordId}
                                data-object-api-name={item.objectApiName}
                                onclick={handleContextMenuItemClick}
                                disabled={isDeletingEvent}
                            >
                                <span class="event-context-menu__item-label">{item.label}</span>
                                <template if:true={item.description}>
                                    <span class="event-context-menu__item-meta slds-truncate" title={item.description}>
                                        {item.description}
                                    </span>
                                </template>
                            </button>
                        </template>
                    </section>
                </template>

                <template if:true={hasHoveredEventPreview}>
                    <section class="event-hover-card" style={hoveredEventPreviewStyle} role="tooltip">
                        <div class="event-hover-card__title">{hoveredEventPreview.title}</div>
                        <template for:each={hoveredEventPreview.lines} for:item="line">
                            <div key={line.key} class="event-hover-card__line">{line.text}</div>
                        </template>
                    </section>
                </template>
            </div>
        </div>

        <c-calendar-google-sync-modals
            show-connect-modal={showGoogleConnectModal}
            show-import-modal={showGoogleImportModal}
            show-export-modal={showGoogleExportModal}
            google-sync-view-state={googleSyncViewState}
            sync-message={syncMessage}
            ongoogleconnectmodalclose={handleGoogleModalEvent}
            ongoogleconnectmodallaunch={handleGoogleModalEvent}
            ongoogleconnectmodalrefresh={handleGoogleModalEvent}
            ongoogleimportmodalclose={handleGoogleModalEvent}
            ongoogleimportmodalcalendarchange={handleGoogleModalEvent}
            ongoogleimportmodallaunch={handleGoogleModalEvent}
            ongoogleimportmodalrefresh={handleGoogleModalEvent}
            ongoogleimportmodalcontinue={handleGoogleModalEvent}
            ongoogleimportcalendarselectionchange={handleGoogleModalEvent}
            ongoogleexportmodalclose={handleGoogleModalEvent}
            ongoogleexportmodalcalendarchange={handleGoogleModalEvent}
            ongoogleexportmodallaunch={handleGoogleModalEvent}
            ongoogleexportmodalrefresh={handleGoogleModalEvent}
            ongoogleexportmodalcontinue={handleGoogleModalEvent}
            ongoogleexportcalendarselectionchange={handleGoogleModalEvent}
        >
        </c-calendar-google-sync-modals>

        <template if:true={pendingDeleteConfirm}>
            <section role="dialog" tabindex="-1" aria-modal="true" aria-labelledby="delete-confirm-heading" class="slds-modal slds-fade-in-open">
                <div class="slds-modal__container" style="max-width:25rem;">
                    <header class="slds-modal__header">
                        <h2 id="delete-confirm-heading" class="slds-text-heading_medium">Confirm Delete</h2>
                    </header>
                    <div class="slds-modal__content slds-p-around_medium">
                        <p>{pendingDeleteConfirm.message}</p>
                    </div>
                    <footer class="slds-modal__footer">
                        <button type="button" class="slds-button slds-button_neutral" onclick={handleCancelDelete}>Cancel</button>
                        <button type="button" class="slds-button slds-button_destructive" onclick={handleConfirmDelete}>Delete</button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>

        <template if:true={showCreateModal}>
            <c-calendar-create-modal
                default-start={defaultStart}
                default-end={defaultEnd}
                default-calendar-id={defaultCalendarId}
                active-user-options={activeUserOptions}
                current-user-id={currentUserId}
                onclose={handleCloseModal}
                onsuccess={handleCreateSuccess}
                onerror={handleCreateError}
            >
            </c-calendar-create-modal>
        </template>

        <template if:true={showDrawer}>
            <c-calendar-event-drawer
                record-id={selectedRecordId}
                object-api-name={selectedRecordObjectApiName}
                record-context-id={selectedRecordContextId}
                can-edit={selectedRecordCanEdit}
                can-delete={selectedRecordCanDelete}
                occurrence-date={selectedRecordOccurrenceDate}
                is-recurring={selectedRecordIsRecurring}
                onmutation={handleDrawerMutation}
                onclose={handleCloseDrawer}
            >
            </c-calendar-event-drawer>
        </template>

        <!-- Quick-Create Popover -->
        <template if:true={hasQuickCreate}>
            <div class="qc-backdrop" onclick={handleQuickCreateClose}></div>
            <div class="qc-popover" style={quickCreateStyle} role="dialog" aria-modal="true" aria-labelledby="qc-heading">
                <div class="qc-header">
                    <span id="qc-heading" class="qc-heading">New Event</span>
                    <button class="qc-close-btn" onclick={handleQuickCreateClose} title="Close" aria-label="Close quick-create">✕</button>
                </div>
                <div class="qc-body">
                    <div class="qc-field">
                        <label class="qc-label" for="qc-title">Title <abbr title="required">*</abbr></label>
                        <input
                            id="qc-title"
                            type="text"
                            class="qc-input"
                            value={quickCreateTitle}
                            onchange={handleQuickCreateTitleChange}
                            placeholder="Event title"
                            maxlength="255"
                        />
                    </div>
                    <div class="qc-field">
                        <label class="qc-label" for="qc-calendar">Calendar</label>
                        <lightning-combobox
                            id="qc-calendar"
                            name="quickCreateCalendar"
                            value={quickCreateCalendarId}
                            options={quickCreateCalendarOptions}
                            onchange={handleQuickCreateCalendarChange}
                            variant="label-hidden"
                        ></lightning-combobox>
                    </div>
                </div>
                <div class="qc-footer">
                    <lightning-button
                        label="More Details"
                        variant="base"
                        onclick={handleQuickCreateMoreDetails}
                        disabled={quickCreateIsSaving}
                    ></lightning-button>
                    <lightning-button
                        label="Save"
                        variant="brand"
                        onclick={handleQuickCreateSave}
                        disabled={quickCreateIsSaving}
                    ></lightning-button>
                </div>
            </div>
        </template>

        <template if:true={showKeyboardShortcutOverlay}>
            <section
                role="dialog"
                tabindex="-1"
                aria-modal="true"
                aria-labelledby="kb-shortcut-heading"
                class="slds-modal slds-fade-in-open"
            >
                <div class="slds-modal__container" style="max-width:32rem;">
                    <header class="slds-modal__header">
                        <button
                            class="slds-button slds-button_icon slds-button_icon-inverse slds-modal__close"
                            title="Close"
                            onclick={handleKeyboardShortcutOverlayClose}
                        >
                            <lightning-icon icon-name="utility:close" size="small" alternative-text="Close"></lightning-icon>
                        </button>
                        <h2 id="kb-shortcut-heading" class="slds-text-heading_medium">Keyboard Shortcuts</h2>
                    </header>
                    <div class="slds-modal__content slds-p-around_medium kb-shortcut-grid">
                        <div class="kb-section-label">Navigation</div>
                        <div class="kb-row"><kbd>T</kbd><span>Go to Today</span></div>
                        <div class="kb-row"><kbd>←</kbd><span>Previous period</span></div>
                        <div class="kb-row"><kbd>→</kbd><span>Next period</span></div>
                        <div class="kb-section-label">Views</div>
                        <div class="kb-row"><kbd>M</kbd><span>Month view</span></div>
                        <div class="kb-row"><kbd>W</kbd><span>Week view</span></div>
                        <div class="kb-row"><kbd>D</kbd><span>Day view</span></div>
                        <div class="kb-row"><kbd>A</kbd><span>Agenda view</span></div>
                        <div class="kb-section-label">Actions</div>
                        <div class="kb-row"><kbd>N</kbd><span>New Event</span></div>
                        <div class="kb-row"><kbd>R</kbd><span>Refresh</span></div>
                        <div class="kb-row"><kbd>Esc</kbd><span>Close modal / drawer</span></div>
                        <div class="kb-row"><kbd>?</kbd><span>Show this help</span></div>
                    </div>
                    <footer class="slds-modal__footer">
                        <button type="button" class="slds-button slds-button_brand" onclick={handleKeyboardShortcutOverlayClose}>
                            Close
                        </button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>

    </lightning-card>
</template>
