<template>
    <template if:true={hasGroups}>
        <div class="slds-p-horizontal_small slds-p-bottom_small">
            <template for:each={groups} for:item="group">
                <section key={group.key} class="slds-box slds-m-bottom_small">
                    <div class="slds-grid slds-grid_align-spread slds-grid_vertical-align-center slds-m-bottom_small">
                        <div>
                            <div class="slds-text-heading_small">{group.label}</div>
                            <div class="slds-text-body_small slds-text-color_weak">{group.countLabel}</div>
                        </div>

                        <div>
                            <lightning-button
                                label="Add Event"
                                data-date={group.key}
                                onclick={handleDayAdd}
                            ></lightning-button>
                        </div>
                    </div>

                    <div class="slds-grid slds-wrap slds-gutters_x-small">
                        <template for:each={group.events} for:item="event">
                            <div key={event.id} class="slds-col slds-size_1-of-1">
                                <button
                                    type="button"
                                    class="slds-button slds-button_reset slds-size_1-of-1 slds-box slds-text-align_left"
                                    data-id={event.id}
                                    title={event.hoverText}
                                    onclick={handleEventOpen}
                                >
                                    <div class="slds-grid slds-grid_vertical-align-center slds-gutters_small">
                                        <div class="slds-col slds-no-flex">
                                            <span
                                                style={event.colorBarStyle}
                                                class="slds-badge"
                                            >
                                                &nbsp;
                                            </span>
                                        </div>

                                        <div class="slds-col slds-no-flex slds-text-body_small slds-text-color_weak">
                                            {event.agendaTimeLabel}
                                        </div>

                                        <div class="slds-col">
                                            <div class="slds-text-title_bold">{event.name}</div>
                                            <div class="slds-text-body_small slds-text-color_weak">
                                                {event.calendarName} • {event.statusLabel}
                                            </div>
                                        </div>

                                        <template if:true={event.syncStatusLabel}>
                                            <div class="slds-col slds-no-flex">
                                                <span class="slds-badge">{event.syncStatusLabel}</span>
                                            </div>
                                        </template>
                                    </div>
                                </button>
                            </div>
                        </template>
                    </div>
                </section>
            </template>
        </div>
    </template>

    <template if:false={hasGroups}>
        <div class="slds-box slds-theme_default slds-m-around_small">
            No events found for this range.
        </div>
    </template>
</template>
