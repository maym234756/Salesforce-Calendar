<template>
    <lightning-card title="Team Calendar Board" icon-name="standard:event">
        <div class="board-wrap">
            <div class="header-row">
                <div>
                    <h2 class="month-title">{rangeLabel}</h2>
                    <div class="event-count">{eventCount} event(s)</div>
                </div>

                <div class="header-actions">
                    <lightning-radio-group
                        type="button"
                        name="viewMode"
                        label="View"
                        options={viewOptions}
                        value={currentView}
                        onchange={handleViewChange}
                    >
                    </lightning-radio-group>

                    <lightning-combobox
                        class="calendar-filter"
                        name="calendarFilter"
                        label="Calendar"
                        value={selectedCalendarId}
                        options={calendarOptions}
                        onchange={handleCalendarChange}
                    >
                    </lightning-combobox>

                    <lightning-combobox
                        class="status-filter"
                        name="statusFilter"
                        label="Status"
                        value={selectedStatus}
                        options={statusOptions}
                        onchange={handleStatusChange}
                    >
                    </lightning-combobox>

                    <lightning-button label="New Event" variant="brand" onclick={handleHeaderNewEvent}></lightning-button>
                    <lightning-button label="Today" onclick={handleToday}></lightning-button>
                    <lightning-button-icon icon-name="utility:refresh" alternative-text="Refresh" onclick={handleRefresh}></lightning-button-icon>
                    <lightning-button-icon icon-name="utility:chevron_left" alternative-text="Previous" onclick={handlePrev}></lightning-button-icon>
                    <lightning-button-icon icon-name="utility:chevron_right" alternative-text="Next" onclick={handleNext}></lightning-button-icon>
                </div>
            </div>

            <template if:true={hasLegend}>
                <div class="legend">
                    <template for:each={legendItems} for:item="item">
                        <div key={item.id} class="legend-item">
                            <span class="legend-swatch" style={item.styleText}></span>
                            <span>{item.name}</span>
                        </div>
                    </template>
                </div>
            </template>

            <template if:true={error}>
                <div class="error-box">
                    {error}
                </div>
            </template>

            <template if:true={isLoading}>
                <div class="loading-box">
                    Loading calendar...
                </div>
            </template>

            <template if:false={isLoading}>
                <template if:true={isGridView}>
                    <div class="weekdays">
                        <div class="weekday">Sun</div>
                        <div class="weekday">Mon</div>
                        <div class="weekday">Tue</div>
                        <div class="weekday">Wed</div>
                        <div class="weekday">Thu</div>
                        <div class="weekday">Fri</div>
                        <div class="weekday">Sat</div>
                    </div>

                    <div class="calendar-grid" style={gridStyle}>
                        <template for:each={weeks} for:item="week">
                            <template for:each={week.days} for:item="day">
                                <div
                                    key={day.key}
                                    class={day.className}
                                    data-date={day.key}
                                    data-current-month={day.currentMonthAttr}
                                    onclick={handleDayClick}
                                >
                                    <div class="day-header">
                                        <span>{day.label}</span>

                                        <template if:true={day.isCurrentMonth}>
                                            <button
                                                type="button"
                                                class="day-add-btn"
                                                data-date={day.key}
                                                onclick={handleDayQuickAdd}
                                                title="Add event"
                                            >
                                                +
                                            </button>
                                        </template>
                                    </div>

                                    <div class="events">
                                        <template for:each={day.events} for:item="event">
                                            <button
                                                key={event.id}
                                                type="button"
                                                class={event.className}
                                                style={event.styleText}
                                                title={event.hoverText}
                                                data-id={event.id}
                                                onclick={handleOpenEvent}
                                            >
                                                <div class="event-time">{event.timeLabel}</div>
                                                <div class="event-title">{event.name}</div>
                                                <div class="event-subtitle">{event.calendarName}</div>
                                            </button>
                                        </template>

                                        <template if:true={day.showNoEvents}>
                                            <div class="empty-day">No events</div>
                                        </template>
                                    </div>
                                </div>
                            </template>
                        </template>
                    </div>
                </template>

                <template if:true={isAgendaView}>
                    <template if:true={hasAgendaEvents}>
                        <div class="agenda-list">
                            <template for:each={agendaGroups} for:item="group">
                                <section key={group.key} class="agenda-group">
                                    <div class="agenda-group-header">
                                        <div class="agenda-date">{group.label}</div>
                                        <button
                                            type="button"
                                            class="agenda-add-btn"
                                            data-date={group.key}
                                            onclick={handleDayQuickAdd}
                                        >
                                            + Add Event
                                        </button>
                                    </div>

                                    <div class="agenda-items">
                                        <template for:each={group.events} for:item="event">
                                            <button
                                                key={event.id}
                                                type="button"
                                                class="agenda-row"
                                                data-id={event.id}
                                                onclick={handleOpenEvent}
                                            >
                                                <span class="agenda-color" style={event.colorBarStyle}></span>
                                                <div class="agenda-time">{event.timeLabel}</div>
                                                <div class="agenda-main">
                                                    <div class="agenda-title">{event.name}</div>
                                                    <div class="agenda-meta">
                                                        {event.calendarName} • {event.statusLabel}
                                                    </div>
                                                </div>
                                            </button>
                                        </template>
                                    </div>
                                </section>
                            </template>
                        </div>
                    </template>

                    <template if:false={hasAgendaEvents}>
                        <div class="agenda-empty">
                            No events found for this range.
                        </div>
                    </template>
                </template>
            </template>
        </div>
    </lightning-card>

    <template if:true={showCreateModal}>
        <section role="dialog" tabindex="-1" aria-modal="true" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <h2 class="slds-text-heading_medium">New Calendar Event</h2>
                </header>

                <div class="slds-modal__content slds-p-around_medium">
                    <lightning-record-edit-form
                        object-api-name="Calendar_Event__c"
                        onsuccess={handleCreateSuccess}
                        onerror={handleCreateError}
                    >
                        <div class="slds-grid slds-wrap slds-gutters">
                            <div class="slds-col slds-size_1-of-1">
                                <lightning-input-field field-name="Name"></lightning-input-field>
                            </div>

                            <div class="slds-col slds-size_1-of-2">
                                <lightning-input-field
                                    field-name="Calendar__c"
                                    value={defaultCalendarId}
                                >
                                </lightning-input-field>
                            </div>

                            <div class="slds-col slds-size_1-of-2">
                                <lightning-input-field field-name="Status__c"></lightning-input-field>
                            </div>

                            <div class="slds-col slds-size_1-of-2">
                                <lightning-input-field
                                    field-name="Start__c"
                                    value={defaultStart}
                                >
                                </lightning-input-field>
                            </div>

                            <div class="slds-col slds-size_1-of-2">
                                <lightning-input-field
                                    field-name="End__c"
                                    value={defaultEnd}
                                >
                                </lightning-input-field>
                            </div>

                            <div class="slds-col slds-size_1-of-2">
                                <lightning-input-field field-name="All_Day__c"></lightning-input-field>
                            </div>

                            <div class="slds-col slds-size_1-of-1">
                                <lightning-input-field field-name="Notes__c"></lightning-input-field>
                            </div>
                        </div>

                        <div class="slds-m-top_medium slds-grid slds-grid_align-end slds-gutters_small">
                            <lightning-button label="Cancel" onclick={handleCloseModal}></lightning-button>
                            <lightning-button variant="brand" type="submit" label="Save"></lightning-button>
                        </div>
                    </lightning-record-edit-form>
                </div>
            </div>
        </section>

        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
